<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <turbo-frame id="list-frame" class="w-full space-y-8 block p-4">
        
        <div class="bg-white border-[6px] border-black p-8 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] rounded-[32px]">
            <h2 class="text-3xl font-black text-[#009B73] mb-6 uppercase tracking-tighter">Den-en-toshi Line</h2>
            
            <div class="w-full bg-gray-100 border-[4px] border-black rounded-2xl mb-8 overflow-hidden">
                <img src="https://www.tanseisha.co.jp/resource/61813_1.jpg" alt="Tokyu 2020 Series" class="w-full h-48 object-cover">
                <div class="p-3 bg-white border-t-[4px] border-black text-center">
                    <p class="text-xs font-black uppercase tracking-widest text-black">Model: Tokyu 2020 Series</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 mb-8">
                <div class="bg-[#B2FF59] p-4 rounded-2xl border-[3px] border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] text-center">
                    <p class="text-[10px] text-black uppercase font-black">Visited</p>
                    <p class="text-3xl font-black text-black">3</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border-[3px] border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] text-center">
                    <p class="text-[10px] text-gray-400 uppercase font-black">Remaining</p>
                    <p class="text-3xl font-black text-gray-300">3</p>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="font-black text-xs text-gray-400 uppercase tracking-widest mb-4">Station Log</h3>
                
                <div class="flex items-center justify-between p-4 bg-white border-[3px] border-black rounded-xl shadow-[4px_4px_0px_0px_rgba(178,255,89,1)]">
                    <span class="font-black text-black uppercase">Sangen-Jaya</span>
                    <span class="text-[10px] bg-[#B2FF59] border-2 border-black px-3 py-1 rounded-lg font-black uppercase text-black">VISITED</span>
                </div>

                <div class="flex items-center justify-between p-4 bg-white border-[3px] border-black rounded-xl opacity-50">
                    <span class="font-black text-gray-400 uppercase">Yoga</span>
                    <span class="text-[10px] border-2 border-gray-300 text-gray-400 px-3 py-1 rounded-lg font-black uppercase">LOCKED</span>
                </div>
            </div>
        </div>

    </turbo-frame>
</body>
</html>
