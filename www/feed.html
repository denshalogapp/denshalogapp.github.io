<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <turbo-frame id="feed-frame" class="flex flex-col w-full px-6 pt-8 pb-32 min-h-screen">
        <div class="flex items-center justify-between mb-8 mt-2">
            <h2 class="text-black dark:text-white font-black text-4xl uppercase tracking-tighter">Feed</h2>
            <button id="new-post-btn" class="bg-[#B2FF59] border-[4px] border-black rounded-xl px-5 py-2 font-black uppercase text-sm tracking-tighter shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-y-[4px] active:translate-x-[4px] transition-all">
                + Post
            </button>
        </div>
        <div id="feed-posts-list" class="flex flex-col gap-8 w-full"></div>
    </turbo-frame>
</body>
</html>
