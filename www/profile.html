<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
</head>
<body>
<turbo-frame id="profile-frame">
    <div class="flex flex-col h-full relative w-full">
        <div class="px-6 pb-6 pt-[calc(1.5rem+env(safe-area-inset-top))] flex items-center justify-between border-b-[5px] border-black bg-[#B2FF59] sticky top-0 z-10">
            <h2 class="text-3xl font-black uppercase tracking-tighter text-black">Profile</h2>
            <button id="close-profile-btn" class="w-12 h-12 border-[4px] border-black rounded-full flex items-center justify-center bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none transition-all">
                <svg class="w-6 h-6" fill="none" stroke="black" viewBox="0 0 24 24" stroke-width="4"><path d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-6 pb-32 w-full max-w-md mx-auto relative">
            
            <div class="bg-white border-[5px] border-black rounded-[32px] p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] flex flex-col gap-4 relative overflow-hidden">
                <div class="flex items-center gap-4">
                    <div class="w-20 h-20 bg-[#40C4FF] border-[4px] border-black rounded-full flex items-center justify-center shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] shrink-0">
                        <svg class="w-10 h-10" fill="none" stroke="black" viewBox="0 0 24 24" stroke-width="3"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div class="flex flex-col flex-1 min-w-0 justify-center">
                        <h3 id="profile-username" class="text-2xl font-black uppercase tracking-tighter truncate w-full">Guest</h3>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <div class="bg-gray-100 border-[3px] border-black rounded-2xl p-3 flex flex-col items-center justify-center text-center shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                        <span id="profile-stations-count" class="text-2xl font-black tracking-tighter">0</span>
                        <span class="text-[9px] font-black uppercase text-gray-500 tracking-widest">Stations</span>
                    </div>
                    <div class="bg-[#FF80AB] border-[3px] border-black rounded-2xl p-3 flex flex-col items-center justify-center text-center shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                        <span id="profile-stamps-count" class="text-2xl font-black tracking-tighter text-black">0</span>
                        <span class="text-[9px] font-black uppercase text-black tracking-widest">Stamps</span>
                    </div>
                </div>
            </div>

            <div class="bg-white border-[5px] border-black rounded-[32px] p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] flex flex-col gap-4 relative">
                <h3 class="text-xl font-black uppercase tracking-tighter">Friends List</h3>
                
                <div class="flex gap-2 relative">
                    <input type="text" id="friend-search-input" placeholder="Add by username" class="flex-1 bg-gray-100 border-[3px] border-black rounded-xl px-4 py-3 text-sm font-black uppercase placeholder-gray-400 focus:outline-none focus:bg-white transition-colors" />
                    <button id="send-friend-request-btn" class="bg-[#B2FF59] border-[3px] border-black rounded-xl px-4 py-3 text-black font-black text-sm uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none transition-all shrink-0 flex items-center justify-center">
                        Add
                    </button>
                    
                    <div id="friend-guest-overlay" class="absolute inset-0 z-10 cursor-pointer hidden rounded-xl"></div>
                </div>
                
                <p id="friend-message" class="text-xs font-bold uppercase tracking-widest hidden"></p>

                <div class="w-full h-[4px] bg-black my-2"></div>

                <div class="flex flex-col gap-4">
                    <h4 class="text-sm font-black uppercase tracking-widest text-gray-500">Requests</h4>
                    <div id="friend-requests-list" class="flex flex-col gap-3 empty:hidden"></div>
                    <div id="no-requests-msg" class="text-[10px] font-black text-gray-400 uppercase tracking-widest text-center py-4">No pending requests</div>
                </div>
            </div>
        </div>
    </div>
</turbo-frame>
</body>
</html>
